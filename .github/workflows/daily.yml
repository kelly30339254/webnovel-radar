   ```yaml
     name: Daily Update & Deploy

     on:
       schedule:
         - cron: '23 23 * * *'
       workflow_dispatch:

     jobs:
       update-and-deploy:
         runs-on: ubuntu-latest
         permissions:
           contents: write
         steps:
           - name: Checkout
             uses: actions/checkout@v4

           - name: Setup Node.js
             uses: actions/setup-node@v4
             with:
               node-version: 20
               cache: 'npm'

           - name: Install deps
             run: npm ci

           - name: Install CloudBase CLI
             run: npm install -g @cloudbase/cli

           - name: Update data
             run: node scripts/update-data.mjs

           - name: Build
             run: npm run build

           - name: Deploy to CloudBase
             env:
               TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
               TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
             run: |
               tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
               tcb hosting deploy ./dist -e nailong-d4g922z6h6d9ff59e

           - name: Commit data changes
             run: |
               git config user.name "github-actions[bot]"
               git config user.email "github-actions[bot]@users.noreply.github.com"
               git add public/data/
               git diff --cached --quiet || git commit -m "chore: daily data update $(date +%Y-%m-%d)"
               git push
   ```

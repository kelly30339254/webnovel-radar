name: Daily Update & Deploy

on:
  schedule:
    - cron: '23 23 * * *'
  workflow_dispatch:

concurrency:
  group: daily-update-main
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Update data
        run: node scripts/update-data.mjs

      - name: Prepare verified data commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: daily data update $(date +%Y-%m-%d)"

      - name: Rebase onto latest main
        run: git pull --rebase origin main

      - name: Build
        run: npm run build

      - name: Push verified data update
        run: git push origin HEAD:main

      - name: Deploy to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          tcb hosting deploy ./dist -e nailong-d4g922z6h6d9ff59e
